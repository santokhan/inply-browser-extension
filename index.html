<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rule Builder</title>
</head>

<body class="w-[320px]">
    <noscript>
        <div class="p-4 space-y-3">
            <!-- Select -->
            <select id="type"
                class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400"
                title="Selector">
                <option value="name">Name</option>
                <option value="id">ID</option>
                <option value="class">Class</option>
            </select>

            <!-- Inputs -->
            <input id="selector" placeholder="Field name / id / class"
                class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400" />

            <input id="value" placeholder="Value to set"
                class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400" />

            <!-- Buttons -->
            <div class="flex gap-2">
                <button id="add"
                    class="flex-1 bg-primary-600 hover:bg-primary-700 text-white text-xs py-1.5 rounded-md transition"
                    title="Add Rule">
                    Add Rule
                </button>

                <button id="applyAll"
                    class="flex-1 bg-green-600 hover:bg-green-700 text-white text-xs py-1.5 rounded-md transition"
                    title="Apply All Rule">
                    Apply All
                </button>
            </div>

            <!-- Rules -->
            <div>
                <h3 class="text-sm font-medium text-gray-700 mb-1">Saved Rules</h3>
                <div id="rules" class="space-y-1"></div>
            </div>

        </div>
        <!-- <script async src="browser@4.js"></script> -->
        <!-- <script src="popup.js"></script> -->
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
